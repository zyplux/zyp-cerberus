name: copilot-review-gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  statuses: write
  checks: read

concurrency:
  group: copilot-review-gate-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.draft }}
  cancel-in-progress: true

jobs:
  mirror:
    name: mirror copilot review
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Copilot review and mirror it to a commit status
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          post() {
            args=(-f "state=$1" -f context=copilot-review-complete -f "description=$2")
            [ -n "${3:-}" ] && args+=(-f "target_url=$3")
            gh api --method POST "repos/$REPO/statuses/$SHA" "${args[@]}"
          }
          post pending "Waiting for Copilot review to complete" "" \
            || echo "::warning::could not post pending copilot-review-complete status (continuing)"
          for _ in $(seq 1 80); do
            run=$(gh api "repos/$REPO/commits/$SHA/check-runs" \
              --jq '[.check_runs[] | select(.name == "copilot-pull-request-reviewer")] | first' 2>/dev/null || echo '')
            status=$(echo "$run" | jq -r '.status // ""' 2>/dev/null || echo '')
            conclusion=$(echo "$run" | jq -r '.conclusion // ""' 2>/dev/null || echo '')
            details=$(echo "$run" | jq -r '.details_url // ""' 2>/dev/null || echo '')
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                post success "Copilot review success" "$details"
              else
                post failure "Copilot review concluded: $conclusion" "$details"
              fi
              exit $?
            fi
            sleep 15
          done
          post error "Timed out waiting for the Copilot review check-run to complete" ""
          exit 1
