name: release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  npm:
    name: publish to npm
    if: startsWith(github.event.release.tag_name, 'eslint-config-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Assert release tag matches package version
        working-directory: packages/eslint-config
        run: |
          version="$(bun --print "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#eslint-config-v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::release tag '$GITHUB_REF_NAME' does not match package version '$version'"
            exit 1
          fi
      - name: Authenticate to npm
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish
        working-directory: packages/eslint-config
        run: |
          bun pm pack
          npm publish ./*.tgz --access public

  pypi:
    name: publish to PyPI
    if: startsWith(github.event.release.tag_name, 'cerberus-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Assert release tag matches package version
        working-directory: apps/cerberus
        run: |
          version="$(uv version --short)"
          tag="${GITHUB_REF_NAME#cerberus-v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::release tag '$GITHUB_REF_NAME' does not match package version '$version'"
            exit 1
          fi
      - name: Build
        run: uv build --package zyplux-cerberus
      - name: Publish
        run: uv publish

  ghcr:
    name: publish CI image to GHCR
    if: startsWith(github.event.release.tag_name, 'ci-image-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Assert release tag matches image version
        run: |
          version="$(grep -oP 'org\.opencontainers\.image\.version="\K[^"]+' containers/ci/Containerfile)"
          tag="${GITHUB_REF_NAME#ci-image-v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::release tag '$GITHUB_REF_NAME' does not match image version '$version'"
            exit 1
          fi
      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GH_TOKEN" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        run: |
          version="${GITHUB_REF_NAME#ci-image-v}"
          podman build -t "ghcr.io/zyplux/ci:${version}" -t ghcr.io/zyplux/ci:latest containers/ci
          podman push "ghcr.io/zyplux/ci:${version}"
          podman push ghcr.io/zyplux/ci:latest
