[project]
name = "zyplux-util"
version = "0.1.0"
description = "Small Python utilities shared across zyplux repos"
readme = "README.md"
requires-python = ">=3.14"
dependencies = []

[build-system]
requires = ["uv_build>=0.11,<0.12"]
